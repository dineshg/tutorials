<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Appendix A — Lead DS Interview Talk Track (60 min)</title>
  <link rel="stylesheet" href="../assets/css/book.css" />
  <style>
    .ch { font-size: 16px; line-height: 1.65; }
    .ch h1 { font-size: 2em; border-bottom: 3px solid #0969da; padding-bottom: .4em; }
    .ch h2 { font-size: 1.4em; margin-top: 1.8em; border-left: 4px solid #0969da; padding-left: .6em; }
    .ch h3 { font-size: 1.15em; margin-top: 1.3em; color: #24292f; }
    .ch pre { background: #0d1117; color: #e6edf3; padding: 14px 16px; border-radius: 8px; overflow-x: auto; }
    .ch code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }
    .ch table { border-collapse: collapse; margin: 12px 0; }
    .ch th, .ch td { border: 1px solid #d0d7de; padding: 8px 10px; text-align: left; vertical-align: top; }
    .ch th { background: #f6f8fa; }
    .ch blockquote { border-left: 4px solid #d0d7de; color: #57606a; margin: 0; padding: 4px 12px; }
  </style>
  <!-- Markdown renderer (CDN) -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>

<div class="ch">
  <div class="tr-tip">
    <strong>About this appendix</strong>
    The original source is the markdown file
    <a href="01-lead-ds-interview-talk-track.md"><code>01-lead-ds-interview-talk-track.md</code></a>.
    This HTML wrapper renders that file inline so it reads as a normal book
    chapter. If the rendered view is blank, open the
    <a href="01-lead-ds-interview-talk-track.md">raw markdown file</a>
    directly.
  </div>

  <div id="md-render">Loading talk track…</div>
</div>

<script>
  // Fetch the sibling .md file and render it with marked.
  // Works both via http(s) and file:// in browsers that allow same-folder fetch.
  (function () {
    function render(text) {
      var target = document.getElementById('md-render');
      if (typeof marked === 'undefined') {
        // marked not yet loaded; retry shortly
        return setTimeout(function () { render(text); }, 50);
      }
      target.innerHTML = marked.parse(text);
    }
    fetch('01-lead-ds-interview-talk-track.md')
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(render)
      .catch(function (err) {
        document.getElementById('md-render').innerHTML =
          '<div class="tr-warn"><strong>Could not load the markdown source.</strong> ' +
          'This usually happens when opening the page over <code>file://</code> in a browser ' +
          'that blocks local fetches. Open <a href="01-lead-ds-interview-talk-track.md">' +
          'the raw markdown file</a> directly, or serve the book via ' +
          '<code>python3 -m http.server</code> from <code>tutorial_refined/</code>. ' +
          'Error: ' + err.message + '</div>';
      });
  })();
</script>

<script src="../assets/js/nav.js"></script>
</body>
</html>
