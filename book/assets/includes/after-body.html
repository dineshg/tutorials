<script>
(function () {
  "use strict";

  var parts = [
    { key: "orientation", prefix: "/00-orientation/", label: "Orientation", note: "Start here: audience, delivery map, case study, and reading paths." },
    { key: "ml", prefix: "/01-ml-foundations/", label: "ML Foundations", note: "Build the evaluation and modelling discipline production systems need." },
    { key: "deep-learning", prefix: "/02-deep-learning/", label: "Deep Learning", note: "Move from logistic regression intuition to neural networks and transformers." },
    { key: "llm", prefix: "/03-llm-applications/", label: "LLM Applications", note: "Design prompting, retrieval, structured outputs, evaluation, and tuning." },
    { key: "backend", prefix: "/04-backend-engineering/", label: "Backend Engineering", note: "Turn notebook logic into reliable APIs, jobs, containers, and observability." },
    { key: "security", prefix: "/05-security-governance/", label: "Security and Governance", note: "Add identity, access control, threat modelling, and release evidence." },
    { key: "agents", prefix: "/06-agentic-systems/", label: "Agentic Systems", note: "Understand workflows, tools, MCP, A2A, framework choices, and observability." },
    { key: "delivery", prefix: "/07-enterprise-delivery/", label: "Enterprise Delivery", note: "Lead the project from business pain to rollout and support." },
    { key: "projects", prefix: "/08-projects/", label: "Projects", note: "Apply the book through runnable end-to-end systems." },
    { key: "appendices", prefix: "/appendices/", label: "Appendices", note: "Use the templates, checklists, glossary, and review material." }
  ];

  function currentPart() {
    var path = window.location.pathname;
    for (var i = 0; i < parts.length; i += 1) {
      if (path.indexOf(parts[i].prefix) !== -1) return parts[i];
    }
    return { key: "home", label: "Book Home", note: "Choose a reading path or follow the default journey." };
  }

  var part = currentPart();
  document.body.setAttribute("data-book-part", part.key);

  var progress = document.createElement("div");
  progress.className = "book-progress";
  progress.setAttribute("aria-hidden", "true");
  progress.innerHTML = '<div class="book-progress__bar"></div>';
  document.body.appendChild(progress);

  function updateProgress() {
    var bar = progress.querySelector(".book-progress__bar");
    var scrollTop = window.scrollY || document.documentElement.scrollTop;
    var height = document.documentElement.scrollHeight - window.innerHeight;
    var pct = height > 0 ? Math.min(100, Math.max(0, (scrollTop / height) * 100)) : 0;
    bar.style.width = pct + "%";
  }

  window.addEventListener("scroll", updateProgress, { passive: true });
  window.addEventListener("resize", updateProgress);
  updateProgress();

  var title = document.querySelector("main.content h1, #quarto-document-content h1");
  var isHome = part.key === "home";
  if (title && !isHome && !document.querySelector(".journey-ribbon")) {
    var ribbon = document.createElement("aside");
    ribbon.className = "journey-ribbon";
    ribbon.innerHTML =
      '<span class="journey-ribbon__label">' + part.label + '</span>' +
      '<span class="journey-ribbon__text">' + part.note + '</span>';
    title.insertAdjacentElement("afterend", ribbon);
  }

  document.querySelectorAll("[data-path-switcher]").forEach(function (switcher) {
    var tabs = switcher.querySelectorAll("[data-path-tab]");
    var panels = switcher.querySelectorAll("[data-path-panel]");
    if (!tabs.length || !panels.length) return;

    function activate(id) {
      tabs.forEach(function (tab) {
        var active = tab.getAttribute("data-path-tab") === id;
        tab.setAttribute("aria-selected", active ? "true" : "false");
      });
      panels.forEach(function (panel) {
        panel.hidden = panel.getAttribute("data-path-panel") !== id;
      });
    }

    tabs.forEach(function (tab) {
      tab.setAttribute("type", "button");
      tab.addEventListener("click", function () {
        activate(tab.getAttribute("data-path-tab"));
      });
    });

    activate(tabs[0].getAttribute("data-path-tab"));
  });
})();
</script>
