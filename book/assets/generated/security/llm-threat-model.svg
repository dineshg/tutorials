<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img">
  <rect width="960" height="540" fill="#ffffff"/>
  <style>
    .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
    .label { font: 600 17px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
    .small { font: 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #4b5563; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
    .blue { fill: #dbeafe; stroke: #2563eb; }
    .green { fill: #dcfce7; stroke: #16a34a; }
    .orange { fill: #ffedd5; stroke: #ea580c; }
    .red { fill: #fee2e2; stroke: #dc2626; }
    .purple { fill: #ede9fe; stroke: #7c3aed; }
    .line { stroke: #334155; stroke-width: 3; fill: none; }
    .thin { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    .arrow { marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
<text x="48" y="58" class="title">LLM Application Threat Model</text>
  <rect x="70.0" y="210" width="184.0" height="120" class="box blue"/>
  <text x="162.0" y="258" text-anchor="middle" class="label">User</text>
  <text x="162.0" y="292" text-anchor="middle" class="small">prompt</text>
  <line x1="254.0" y1="270" x2="276.0" y2="270" class="line arrow"/>
  <rect x="282.0" y="210" width="184.0" height="120" class="box green"/>
  <text x="374.0" y="258" text-anchor="middle" class="label">Retrieved docs</text>
  <text x="374.0" y="292" text-anchor="middle" class="small">indirect input</text>
  <line x1="466.0" y1="270" x2="488.0" y2="270" class="line arrow"/>
  <rect x="494.0" y="210" width="184.0" height="120" class="box orange"/>
  <text x="586.0" y="258" text-anchor="middle" class="label">Tools</text>
  <text x="586.0" y="292" text-anchor="middle" class="small">side effects</text>
  <line x1="678.0" y1="270" x2="700.0" y2="270" class="line arrow"/>
  <rect x="706.0" y="210" width="184.0" height="120" class="box purple"/>
  <text x="798.0" y="258" text-anchor="middle" class="label">Logs</text>
  <text x="798.0" y="292" text-anchor="middle" class="small">evidence</text>

</svg>
