name: Check assets

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check image and media references
        run: python scripts/check_assets.py
