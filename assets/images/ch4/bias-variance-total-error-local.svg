<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
<title id="title">Bias and variance contributing to total error</title>
<desc id="desc">Conceptual plot showing bias decreasing, variance increasing, and total error forming a U-shaped curve as model complexity grows.</desc>
<rect width="1100" height="620" fill="#f6f8fa"/>
<rect x="48" y="42" width="1004" height="536" rx="18" fill="#fff" stroke="#d0d7de" stroke-width="2"/>
<text x="550" y="92" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#1f2328">Bias-Variance Tradeoff</text>
<g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" fill="#1f2328">
<line x1="150" y1="475" x2="950" y2="475" stroke="#8c959f" stroke-width="2"/>
<line x1="150" y1="475" x2="150" y2="145" stroke="#8c959f" stroke-width="2"/>
<text x="550" y="535" text-anchor="middle" font-size="20" fill="#59636e">Model complexity</text>
<text x="85" y="315" text-anchor="middle" font-size="20" fill="#59636e" transform="rotate(-90 85 315)">Expected error</text>
<path d="M170 200 C310 240 430 305 540 360 S760 445 930 452" fill="none" stroke="#0969da" stroke-width="6" stroke-linecap="round"/>
<path d="M170 450 C310 430 430 395 560 330 S790 205 930 170" fill="none" stroke="#cf222e" stroke-width="6" stroke-linecap="round"/>
<path d="M170 300 C310 255 445 260 550 315 S760 455 930 470" fill="none" stroke="#8250df" stroke-width="7" stroke-linecap="round"/>
<rect x="720" y="165" width="210" height="120" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
<line x1="745" y1="195" x2="800" y2="195" stroke="#0969da" stroke-width="6"/><text x="815" y="201" font-size="18">Bias squared</text>
<line x1="745" y1="225" x2="800" y2="225" stroke="#cf222e" stroke-width="6"/><text x="815" y="231" font-size="18">Variance</text>
<line x1="745" y1="255" x2="800" y2="255" stroke="#8250df" stroke-width="6"/><text x="815" y="261" font-size="18">Total error</text>
<text x="250" y="510" text-anchor="middle" font-size="18" fill="#59636e">Underfit</text>
<text x="550" y="510" text-anchor="middle" font-size="18" fill="#59636e">Good fit</text>
<text x="850" y="510" text-anchor="middle" font-size="18" fill="#59636e">Overfit</text>
</g>
</svg>
