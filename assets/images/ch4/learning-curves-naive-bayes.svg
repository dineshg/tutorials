<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
<title id="title">Learning curves for a Naive Bayes classifier</title>
<desc id="desc">Conceptual learning curve plot with training score high at small sample sizes and cross-validation score improving as samples increase.</desc>
<rect width="1100" height="620" fill="#f6f8fa"/>
<rect x="48" y="42" width="1004" height="536" rx="18" fill="#fff" stroke="#d0d7de" stroke-width="2"/>
<text x="550" y="92" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#1f2328">Learning Curves</text>
<g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" fill="#1f2328">
<line x1="150" y1="475" x2="950" y2="475" stroke="#8c959f" stroke-width="2"/>
<line x1="150" y1="475" x2="150" y2="145" stroke="#8c959f" stroke-width="2"/>
<g stroke="#eaeef2" stroke-width="1">
<line x1="150" y1="405" x2="950" y2="405"/><line x1="150" y1="335" x2="950" y2="335"/><line x1="150" y1="265" x2="950" y2="265"/><line x1="150" y1="195" x2="950" y2="195"/>
<line x1="310" y1="475" x2="310" y2="145"/><line x1="470" y1="475" x2="470" y2="145"/><line x1="630" y1="475" x2="630" y2="145"/><line x1="790" y1="475" x2="790" y2="145"/>
</g>
<text x="550" y="535" text-anchor="middle" font-size="20" fill="#59636e">Training examples</text>
<text x="85" y="315" text-anchor="middle" font-size="20" fill="#59636e" transform="rotate(-90 85 315)">Score</text>
<path d="M180 180 C300 190 420 205 560 220 S790 242 930 255" fill="none" stroke="#0969da" stroke-width="6" stroke-linecap="round"/>
<path d="M180 430 C300 375 420 330 560 295 S790 265 930 258" fill="none" stroke="#1a7f37" stroke-width="6" stroke-linecap="round"/>
<circle cx="180" cy="180" r="7" fill="#0969da"/><circle cx="930" cy="255" r="7" fill="#0969da"/>
<circle cx="180" cy="430" r="7" fill="#1a7f37"/><circle cx="930" cy="258" r="7" fill="#1a7f37"/>
<rect x="690" y="355" width="240" height="86" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
<line x1="715" y1="385" x2="775" y2="385" stroke="#0969da" stroke-width="6"/><text x="790" y="391" font-size="18">Training score</text>
<line x1="715" y1="415" x2="775" y2="415" stroke="#1a7f37" stroke-width="6"/><text x="790" y="421" font-size="18">Validation score</text>
</g>
</svg>
