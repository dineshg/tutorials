<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Regression: fitting a line</title>
  <desc id="desc">A scatter plot with a best-fit line passing through the cloud of points.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111a33"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="540" rx="24" fill="url(#bg)" filter="url(#shadow)"/>

  <g transform="translate(90,70)">
    <rect x="0" y="0" width="780" height="400" rx="18" fill="#0b1020" opacity="0.55" stroke="rgba(255,255,255,0.16)"/>

    <!-- Axes -->
    <g stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none">
      <path d="M0 400 H780"/>
      <path d="M0 400 V0"/>
    </g>

    <!-- Points -->
    <g fill="#a7f3d0" opacity="0.92">
      <circle cx="90" cy="330" r="7"/>
      <circle cx="140" cy="315" r="6"/>
      <circle cx="190" cy="285" r="7"/>
      <circle cx="240" cy="260" r="6"/>
      <circle cx="300" cy="245" r="7"/>
      <circle cx="350" cy="215" r="6"/>
      <circle cx="410" cy="205" r="7"/>
      <circle cx="470" cy="175" r="6"/>
      <circle cx="530" cy="160" r="7"/>
      <circle cx="610" cy="135" r="6"/>
      <circle cx="700" cy="110" r="7"/>
    </g>

    <!-- Best-fit line -->
    <path d="M40 360 L740 80" stroke="url(#line)" stroke-width="5" stroke-linecap="round" opacity="0.95"/>

    <!-- Equation tag -->
    <g transform="translate(500,34)">
      <rect x="0" y="0" width="250" height="56" rx="14" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.14)"/>
      <text x="18" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="18" fill="rgba(255,255,255,0.90)">y = mx + b</text>
    </g>

    <!-- Axis labels -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="rgba(255,255,255,0.80)">
      <text x="780" y="430" text-anchor="end" font-size="16">x</text>
      <text x="-8" y="10" text-anchor="start" font-size="16">y</text>
    </g>
  </g>
</svg>
