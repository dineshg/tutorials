<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Classification: decision boundary</title>
  <desc id="desc">Two clusters of labeled points separated by a decision boundary line.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111a33"/>
    </linearGradient>
    <linearGradient id="boundary" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="540" rx="24" fill="url(#bg)" filter="url(#shadow)"/>

  <g transform="translate(90,70)">
    <rect x="0" y="0" width="780" height="400" rx="18" fill="#0b1020" opacity="0.55" stroke="rgba(255,255,255,0.16)"/>

    <!-- Axes -->
    <g stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none">
      <path d="M0 400 H780"/>
      <path d="M0 400 V0"/>
    </g>

    <!-- Region tint -->
    <path d="M0 0 H780 V400 H0 Z" fill="rgba(255,255,255,0.02)"/>

    <!-- Class 0 (blue) -->
    <g fill="#60a5fa" opacity="0.95">
      <circle cx="130" cy="290" r="7"/>
      <circle cx="170" cy="320" r="6"/>
      <circle cx="210" cy="270" r="7"/>
      <circle cx="260" cy="300" r="6"/>
      <circle cx="300" cy="260" r="7"/>
      <circle cx="340" cy="285" r="6"/>
      <circle cx="200" cy="340" r="7"/>
      <circle cx="280" cy="350" r="6"/>
    </g>

    <!-- Class 1 (green) -->
    <g fill="#34d399" opacity="0.95">
      <circle cx="520" cy="150" r="7"/>
      <circle cx="570" cy="180" r="6"/>
      <circle cx="610" cy="130" r="7"/>
      <circle cx="660" cy="165" r="6"/>
      <circle cx="700" cy="120" r="7"/>
      <circle cx="640" cy="210" r="6"/>
      <circle cx="740" cy="175" r="7"/>
      <circle cx="560" cy="120" r="6"/>
    </g>

    <!-- Decision boundary -->
    <path d="M110 80 L700 360" stroke="url(#boundary)" stroke-width="5" stroke-linecap="round" opacity="0.95"/>

    <!-- Legend -->
    <g transform="translate(18,18)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
      <rect x="0" y="0" width="320" height="82" rx="14" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.14)"/>
      <circle cx="20" cy="26" r="6" fill="#60a5fa"/>
      <text x="36" y="31" font-size="14" fill="rgba(255,255,255,0.86)">class 0</text>
      <circle cx="110" cy="26" r="6" fill="#34d399"/>
      <text x="126" y="31" font-size="14" fill="rgba(255,255,255,0.86)">class 1</text>
      <rect x="14" y="46" width="22" height="4" rx="2" fill="url(#boundary)"/>
      <text x="44" y="55" font-size="14" fill="rgba(255,255,255,0.86)">decision boundary</text>
    </g>

    <!-- Axis labels -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="rgba(255,255,255,0.80)">
      <text x="780" y="430" text-anchor="end" font-size="16">x₁</text>
      <text x="-8" y="10" text-anchor="start" font-size="16">x₂</text>
    </g>
  </g>
</svg>
