<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Data as points in a space</title>
  <desc id="desc">A simple coordinate plane with a scattered set of points representing examples in feature space.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111a33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="540" rx="24" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Plot area -->
  <g transform="translate(90,70)">
    <rect x="0" y="0" width="780" height="400" rx="18" fill="#0b1020" opacity="0.55" stroke="rgba(255,255,255,0.16)"/>

    <!-- Grid -->
    <g stroke="rgba(255,255,255,0.10)" stroke-width="1">
      <path d="M78 0 V400"/>
      <path d="M156 0 V400"/>
      <path d="M234 0 V400"/>
      <path d="M312 0 V400"/>
      <path d="M390 0 V400"/>
      <path d="M468 0 V400"/>
      <path d="M546 0 V400"/>
      <path d="M624 0 V400"/>
      <path d="M702 0 V400"/>

      <path d="M0 80 H780"/>
      <path d="M0 160 H780"/>
      <path d="M0 240 H780"/>
      <path d="M0 320 H780"/>
    </g>

    <!-- Axes -->
    <g stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none">
      <path d="M0 400 H780"/>
      <path d="M0 400 V0"/>
    </g>

    <!-- Labels -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="rgba(255,255,255,0.80)">
      <text x="780" y="430" text-anchor="end" font-size="16">feature x₁</text>
      <text x="-8" y="10" text-anchor="start" font-size="16">feature x₂</text>
    </g>

    <!-- Points -->
    <g>
      <g fill="#60a5fa" opacity="0.95">
        <circle cx="120" cy="310" r="7"/>
        <circle cx="160" cy="270" r="6"/>
        <circle cx="210" cy="295" r="7"/>
        <circle cx="260" cy="240" r="6"/>
        <circle cx="300" cy="260" r="7"/>
        <circle cx="340" cy="230" r="6"/>
        <circle cx="380" cy="250" r="7"/>
        <circle cx="420" cy="210" r="6"/>
        <circle cx="460" cy="235" r="7"/>
        <circle cx="510" cy="190" r="6"/>
        <circle cx="560" cy="215" r="7"/>
      </g>
      <g fill="#a78bfa" opacity="0.95">
        <circle cx="190" cy="140" r="7"/>
        <circle cx="240" cy="120" r="6"/>
        <circle cx="310" cy="150" r="7"/>
        <circle cx="360" cy="110" r="6"/>
        <circle cx="430" cy="145" r="7"/>
        <circle cx="500" cy="120" r="6"/>
        <circle cx="590" cy="150" r="7"/>
        <circle cx="650" cy="110" r="6"/>
      </g>
      <g fill="#34d399" opacity="0.92">
        <circle cx="620" cy="300" r="7"/>
        <circle cx="680" cy="260" r="6"/>
        <circle cx="720" cy="290" r="7"/>
      </g>
    </g>

    <!-- Caption bubble -->
    <g transform="translate(18,18)">
      <rect x="0" y="0" width="320" height="56" rx="14" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.14)"/>
      <rect x="14" y="18" width="10" height="10" rx="5" fill="url(#accent)"/>
      <text x="34" y="30" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="16" fill="rgba(255,255,255,0.88)">Each example becomes a point</text>
      <text x="34" y="48" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" fill="rgba(255,255,255,0.70)">in a feature space (x₁, x₂, ...)</text>
    </g>
  </g>
</svg>
