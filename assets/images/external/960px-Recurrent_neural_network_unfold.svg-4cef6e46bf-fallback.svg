<rect class="bg" width="1100" height="620"/><rect class="panel" x="42" y="42" width="1016" height="536" rx="18"/>
<text x="550" y="92" text-anchor="middle" font-size="32" font-weight="700">Recurrent neural network</text>
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8c959f"/></marker></defs><text x="550" y="145" text-anchor="middle" font-size="21" class="muted">The same cell is reused across time; hidden state carries information forward.</text><rect class="bfill" x="175" y="250" width="110" height="95"/><text x="230" y="305" text-anchor="middle" font-size="22">RNN</text><text x="230" y="390" text-anchor="middle" font-size="18">t=1</text><path class="axis" d="M290 298 L370 298" marker-end="url(#arr)"/><path class="green" d="M230 225 L230 250"/><text x="230" y="215" text-anchor="middle" font-size="18">x1</text><path class="purple" d="M230 345 L230 385"/><text x="230" y="420" text-anchor="middle" font-size="18">y1</text><rect class="bfill" x="375" y="250" width="110" height="95"/><text x="430" y="305" text-anchor="middle" font-size="22">RNN</text><text x="430" y="390" text-anchor="middle" font-size="18">t=2</text><path class="axis" d="M490 298 L570 298" marker-end="url(#arr)"/><path class="green" d="M430 225 L430 250"/><text x="430" y="215" text-anchor="middle" font-size="18">x2</text><path class="purple" d="M430 345 L430 385"/><text x="430" y="420" text-anchor="middle" font-size="18">y2</text><rect class="bfill" x="575" y="250" width="110" height="95"/><text x="630" y="305" text-anchor="middle" font-size="22">RNN</text><text x="630" y="390" text-anchor="middle" font-size="18">t=3</text><path class="axis" d="M690 298 L770 298" marker-end="url(#arr)"/><path class="green" d="M630 225 L630 250"/><text x="630" y="215" text-anchor="middle" font-size="18">x3</text><path class="purple" d="M630 345 L630 385"/><text x="630" y="420" text-anchor="middle" font-size="18">y3</text><rect class="bfill" x="775" y="250" width="110" height="95"/><text x="830" y="305" text-anchor="middle" font-size="22">RNN</text><text x="830" y="390" text-anchor="middle" font-size="18">t=4</text><path class="green" d="M830 225 L830 250"/><text x="830" y="215" text-anchor="middle" font-size="18">x4</text><path class="purple" d="M830 345 L830 385"/><text x="830" y="420" text-anchor="middle" font-size="18">y4</text>
</svg>
