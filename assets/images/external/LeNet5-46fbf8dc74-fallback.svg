<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8c959f"/></marker></defs><text x="550" y="145" text-anchor="middle" font-size="21" class="muted">Classic CNN pattern: convolution and pooling before dense classification.</text><rect class="bfill" x="140.0" y="245" width="116.7" height="110"/><text x="198.3" y="305" text-anchor="middle" font-size="21" font-weight="700">Input</text><path class="axis" d="M261.7 300 L275.7 300" marker-end="url(#arr)"/><rect class="pfill" x="280.7" y="245" width="116.7" height="110"/><text x="339.0" y="305" text-anchor="middle" font-size="21" font-weight="700">Conv</text><path class="axis" d="M402.3 300 L416.3 300" marker-end="url(#arr)"/><rect class="gfill" x="421.3" y="245" width="116.7" height="110"/><text x="479.7" y="305" text-anchor="middle" font-size="21" font-weight="700">Pool</text><path class="axis" d="M543.0 300 L557.0 300" marker-end="url(#arr)"/><rect class="afill" x="562.0" y="245" width="116.7" height="110"/><text x="620.3" y="305" text-anchor="middle" font-size="21" font-weight="700">Conv</text><path class="axis" d="M683.7 300 L697.7 300" marker-end="url(#arr)"/><rect class="bfill" x="702.7" y="245" width="116.7" height="110"/><text x="761.0" y="305" text-anchor="middle" font-size="21" font-weight="700">Dense</text><path class="axis" d="M824.3 300 L838.3 300" marker-end="url(#arr)"/><rect class="pfill" x="843.3" y="245" width="116.7" height="110"/><text x="901.7" y="305" text-anchor="middle" font-size="21" font-weight="700">Output</text>
