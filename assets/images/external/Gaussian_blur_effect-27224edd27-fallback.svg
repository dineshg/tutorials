<defs>
  <style><![CDATA[
    .bg{fill:#f6f8fa} .panel{fill:#fff;stroke:#d0d7de;stroke-width:2} .axis{stroke:#8c959f;stroke-width:2} .grid{stroke:#eaeef2;stroke-width:1} .blue{stroke:#0969da;fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round} .purple{stroke:#8250df;fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round} .green{stroke:#1a7f37;fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round} .red{stroke:#cf222e;fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round} .box{fill:#f6f8fa;stroke:#d0d7de;stroke-width:2;rx:12} .bfill{fill:#ddf4ff;stroke:#0969da;stroke-width:2;rx:10} .pfill{fill:#f1e5ff;stroke:#8250df;stroke-width:2;rx:10} .gfill{fill:#dafbe1;stroke:#1a7f37;stroke-width:2;rx:10} .afill{fill:#fff8c5;stroke:#9a6700;stroke-width:2;rx:10} text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#1f2328} .muted{fill:#59636e} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
