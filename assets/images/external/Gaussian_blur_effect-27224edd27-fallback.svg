<text x="550" y="92" text-anchor="middle" font-size="32" font-weight="700">Gaussian blur demonstration</text>
<text x="550" y="145" text-anchor="middle" font-size="21" class="muted">A blur kernel averages nearby pixels, softening edges and noise.</text><g transform="translate(250 230)"><rect width="210" height="170" fill="#fff" stroke="#d0d7de"/><circle cx="65" cy="85" r="42" fill="#0969da"/><rect x="115" y="45" width="55" height="80" fill="#cf222e"/></g><path class="purple" d="M510 315 L590 315" marker-end="url(#arr)"/><g transform="translate(650 230)" filter="url(#blur)"><rect width="210" height="170" fill="#fff" stroke="#d0d7de"/><circle cx="65" cy="85" r="42" fill="#0969da"/><rect x="115" y="45" width="55" height="80" fill="#cf222e"/></g><defs><filter id="blur"><feGaussianBlur stdDeviation="6"/></filter><marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8250df"/></marker></defs>
