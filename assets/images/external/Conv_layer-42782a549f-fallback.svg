<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8c959f"/></marker></defs><text x="550" y="145" text-anchor="middle" font-size="21" class="muted">A CNN turns image channels into feature maps, then pooled features and predictions.</text><rect x="145" y="250" width="125" height="95" rx="8" fill="#ddf4ff" stroke="#d0d7de" stroke-width="2"/><text x="215" y="390" text-anchor="middle" font-size="18">Input image</text><path class="axis" d="M295 300 L330 300" marker-end="url(#arr)"/><rect x="335" y="250" width="125" height="95" rx="8" fill="#fff8c5" stroke="#d0d7de" stroke-width="2"/><text x="405" y="390" text-anchor="middle" font-size="18">Convolution</text><path class="axis" d="M485 300 L520 300" marker-end="url(#arr)"/><rect x="535" y="250" width="125" height="95" rx="8" fill="#dafbe1" stroke="#d0d7de" stroke-width="2"/><rect x="551" y="234" width="125" height="95" rx="8" fill="#dafbe1" stroke="#d0d7de" stroke-width="2"/><rect x="567" y="218" width="125" height="95" rx="8" fill="#dafbe1" stroke="#d0d7de" stroke-width="2"/><text x="605" y="390" text-anchor="middle" font-size="18">Feature maps</text><path class="axis" d="M685 300 L720 300" marker-end="url(#arr)"/><rect x="725" y="250" width="125" height="95" rx="8" fill="#f1e5ff" stroke="#d0d7de" stroke-width="2"/><text x="795" y="390" text-anchor="middle" font-size="18">Classifier</text>
