<rect class="bg" width="1100" height="620"/><rect class="panel" x="42" y="42" width="1016" height="536" rx="18"/>
<text x="550" y="92" text-anchor="middle" font-size="32" font-weight="700">Confusion matrix</text>
<text x="550" y="145" text-anchor="middle" font-size="22" class="muted">Rows are actual labels; columns are predicted labels.</text><rect x="315" y="210" width="230" height="120" rx="10" fill="#dafbe1" stroke="#d0d7de" stroke-width="2"/><text x="430" y="268" text-anchor="middle" font-size="22" font-weight="700">True positive</text><text x="430" y="298" text-anchor="middle" font-size="28" class="mono">42</text><rect x="555" y="210" width="230" height="120" rx="10" fill="#ffebe9" stroke="#d0d7de" stroke-width="2"/><text x="670" y="268" text-anchor="middle" font-size="22" font-weight="700">False negative</text><text x="670" y="298" text-anchor="middle" font-size="28" class="mono">6</text><rect x="315" y="340" width="230" height="120" rx="10" fill="#ffebe9" stroke="#d0d7de" stroke-width="2"/><text x="430" y="398" text-anchor="middle" font-size="22" font-weight="700">False positive</text><text x="430" y="428" text-anchor="middle" font-size="28" class="mono">8</text><rect x="555" y="340" width="230" height="120" rx="10" fill="#dafbe1" stroke="#d0d7de" stroke-width="2"/><text x="670" y="398" text-anchor="middle" font-size="22" font-weight="700">True negative</text><text x="670" y="428" text-anchor="middle" font-size="28" class="mono">44</text><text x="430" y="190" text-anchor="middle" font-size="18">Predicted yes</text><text x="670" y="190" text-anchor="middle" font-size="18">Predicted no</text><text x="250" y="278" text-anchor="middle" font-size="18">Actual yes</text><text x="250" y="408" text-anchor="middle" font-size="18">Actual no</text>
</svg>
