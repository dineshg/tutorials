<rect class="bg" width="1100" height="620"/><rect class="panel" x="42" y="42" width="1016" height="536" rx="18"/>
<text x="550" y="92" text-anchor="middle" font-size="32" font-weight="700">Dot product geometry</text>
<text x="550" y="145" text-anchor="middle" font-size="21" class="muted">The dot product grows when two vectors point in a similar direction.</text><line class="axis" x1="190" y1="450" x2="900" y2="450"/><line class="axis" x1="190" y1="450" x2="190" y2="170"/><path class="blue" d="M190 450 L720 235" marker-end="url(#arrb)"/><path class="purple" d="M190 450 L600 355" marker-end="url(#arrp)"/><path d="M330 393 A155 155 0 0 1 344 414" fill="none" stroke="#cf222e" stroke-width="5"/><text x="740" y="235" font-size="22">a</text><text x="620" y="365" font-size="22">b</text><text x="460" y="535" text-anchor="middle" font-size="20" class="mono">a dot b = ||a|| ||b|| cos(theta)</text><defs><marker id="arrb" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#0969da"/></marker><marker id="arrp" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8250df"/></marker></defs>
</svg>
