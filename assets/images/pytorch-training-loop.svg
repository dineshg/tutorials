<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">PyTorch training loop steps</title>
  <desc id="desc">A simple flow diagram showing the five main steps of a training iteration: zero gradients, forward pass, compute loss, backward pass, and optimizer step.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111a33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.75)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="540" rx="24" fill="url(#bg)" filter="url(#shadow)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <text x="60" y="74" font-size="28" fill="rgba(255,255,255,0.92)">Training iteration (one step)</text>
    <text x="60" y="104" font-size="15" fill="rgba(255,255,255,0.70)">Repeat for many epochs</text>
  </g>

  <!-- Boxes -->
  <g transform="translate(60,140)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <g>
      <rect x="0" y="0" width="360" height="78" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <rect x="18" y="24" width="10" height="10" rx="5" fill="url(#accent)"/>
      <text x="40" y="34" font-size="18" fill="rgba(255,255,255,0.92)">1) optimizer.zero_grad()</text>
      <text x="40" y="56" font-size="13" fill="rgba(255,255,255,0.70)">clear previous gradients</text>
    </g>

    <g transform="translate(480,0)">
      <rect x="0" y="0" width="360" height="78" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <rect x="18" y="24" width="10" height="10" rx="5" fill="url(#accent)"/>
      <text x="40" y="34" font-size="18" fill="rgba(255,255,255,0.92)">2) y_pred = model(x)</text>
      <text x="40" y="56" font-size="13" fill="rgba(255,255,255,0.70)">forward pass</text>
    </g>

    <g transform="translate(0,140)">
      <rect x="0" y="0" width="360" height="78" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <rect x="18" y="24" width="10" height="10" rx="5" fill="url(#accent)"/>
      <text x="40" y="34" font-size="18" fill="rgba(255,255,255,0.92)">3) loss = criterion(y_pred, y)</text>
      <text x="40" y="56" font-size="13" fill="rgba(255,255,255,0.70)">compute scalar objective</text>
    </g>

    <g transform="translate(480,140)">
      <rect x="0" y="0" width="360" height="78" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <rect x="18" y="24" width="10" height="10" rx="5" fill="url(#accent)"/>
      <text x="40" y="34" font-size="18" fill="rgba(255,255,255,0.92)">4) loss.backward()</text>
      <text x="40" y="56" font-size="13" fill="rgba(255,255,255,0.70)">compute gradients</text>
    </g>

    <g transform="translate(240,280)">
      <rect x="0" y="0" width="360" height="78" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
      <rect x="18" y="24" width="10" height="10" rx="5" fill="url(#accent)"/>
      <text x="40" y="34" font-size="18" fill="rgba(255,255,255,0.92)">5) optimizer.step()</text>
      <text x="40" y="56" font-size="13" fill="rgba(255,255,255,0.70)">update parameters</text>
    </g>

    <!-- Arrows -->
    <g stroke="rgba(255,255,255,0.70)" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
      <path d="M360 39 H452"/>
      <path d="M660 78 V124"/>
      <path d="M600 179 H452"/>
      <path d="M360 179 H452"/>
      <path d="M660 218 V262"/>
      <path d="M660 319 H624"/>
      <path d="M240 319 H204"/>
      <path d="M180 319 V40"/>
    </g>

    <!-- Loop label -->
    <g transform="translate(740,298)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
      <rect x="0" y="0" width="180" height="44" rx="12" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.14)"/>
      <text x="14" y="28" font-size="14" fill="rgba(255,255,255,0.85)">repeat (epochs)</text>
    </g>
  </g>
</svg>
