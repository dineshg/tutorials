<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img">
  <rect width="960" height="540" fill="#ffffff"/>
  <style>
    .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
    .label { font: 600 17px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
    .small { font: 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #4b5563; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
    .blue { fill: #dbeafe; stroke: #2563eb; }
    .green { fill: #dcfce7; stroke: #16a34a; }
    .orange { fill: #ffedd5; stroke: #ea580c; }
    .red { fill: #fee2e2; stroke: #dc2626; }
    .purple { fill: #ede9fe; stroke: #7c3aed; }
    .line { stroke: #334155; stroke-width: 3; fill: none; }
    .thin { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    .arrow { marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
<text x="48" y="58" class="title">AI Delivery Lifecycle</text>
  <rect x="70.0" y="210" width="141.6" height="120" class="box blue"/>
  <text x="140.8" y="258" text-anchor="middle" class="label">Pain</text>
  <text x="140.8" y="292" text-anchor="middle" class="small">opportunity</text>
  <line x1="211.6" y1="270" x2="233.6" y2="270" class="line arrow"/>
  <rect x="239.6" y="210" width="141.6" height="120" class="box green"/>
  <text x="310.4" y="258" text-anchor="middle" class="label">Intake</text>
  <text x="310.4" y="292" text-anchor="middle" class="small">requirements</text>
  <line x1="381.2" y1="270" x2="403.2" y2="270" class="line arrow"/>
  <rect x="409.2" y="210" width="141.6" height="120" class="box orange"/>
  <text x="480.0" y="258" text-anchor="middle" class="label">Design</text>
  <text x="480.0" y="292" text-anchor="middle" class="small">HLD/LLD</text>
  <line x1="550.8" y1="270" x2="572.8" y2="270" class="line arrow"/>
  <rect x="578.8" y="210" width="141.6" height="120" class="box purple"/>
  <text x="649.6" y="258" text-anchor="middle" class="label">Build</text>
  <text x="649.6" y="292" text-anchor="middle" class="small">sprints</text>
  <line x1="720.4" y1="270" x2="742.4" y2="270" class="line arrow"/>
  <rect x="748.4" y="210" width="141.6" height="120" class="box red"/>
  <text x="819.2" y="258" text-anchor="middle" class="label">Run</text>
  <text x="819.2" y="292" text-anchor="middle" class="small">support</text>

</svg>
